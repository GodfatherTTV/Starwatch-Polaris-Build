<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starwatch Polaris Build - Live Firebase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    font-family: 'Orbitron', system-ui, sans-serif;
    --bg-main: #0a0e1a;
    --bg-panel: #111827;
    --bg-input: #1e293b;
    --border: #1e40af;
    --text-main: #e0f2fe;
    --text-accent: #38bdf8;
    --success: #22c55e;
    --danger: #ef4444;
  }
  body { max-width: 1400px; margin: 0 auto; padding: 20px; background: var(--bg-main); color: var(--text-main); }
  h1, h2 { color: var(--text-accent); border-bottom: 2px solid var(--border); padding-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }
 .header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
 .logo { width: 60px; height: 60px; object-fit: contain; filter: drop-shadow(0 0 10px var(--text-accent)); }
 .title-wrap { display: flex; align-items: center; gap: 12px; }
 .live-badge { background: var(--success); color: #0a0e1a; padding: 4px 12px; border-radius: 4px; font-size: 0.9rem; font-weight: 700; }
 .stats { display: flex; gap: 20px; margin: 20px 0; }
 .stat-card { background: var(--bg-panel); border: 1px solid var(--border); padding: 16px; border-radius: 4px; flex: 1; box-shadow: 0 0 20px rgba(56, 189, 248, 0.1); }
 .stat-num { font-size: 2rem; font-weight: 700; color: var(--text-accent); }
  table { width: 100%; border-collapse: collapse; margin: 20px 0; background: var(--bg-panel); border: 1px solid var(--border); }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1e293b; }
  th { background: #0f172a; color: var(--text-accent); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
  tr:hover { background: #1e293b; }
  input[type="text"], input[type="number"] {
    background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main);
    padding: 6px 8px; border-radius: 4px; box-sizing: border-box; font-family: 'Orbitron', system-ui, sans-serif;
  }
  input[type="number"] { width: 80px; }
 .contributors { display: flex; flex-direction: column; gap: 8px; }
 .contributor-row { display: flex; gap: 8px; align-items: center; }
 .contributor-row input[type="text"] { width: 140px; }
 .add-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 1px solid #1e293b; }
 .add-row input[type="text"] { width: 140px; }
 .add-btn { background: var(--text-accent); color: #0a0e1a; border: none; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; font-family: 'Orbitron', system-ui, sans-serif; }
 .add-btn:hover { background: #7dd3fc; box-shadow: 0 0 10px var(--text-accent); }
 .remove-btn { background: var(--danger); color: white; border: none; padding: 4px 8px;
    border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-family: 'Orbitron', system-ui, sans-serif; }
 .total-have { font-weight: 700; color: var(--success); font-size: 1.1rem; }
 .progress-bar {
    width: 100%; height: 24px; background: var(--bg-panel); border-radius: 4px;
    overflow: hidden; border: 1px solid var(--border); margin: 20px 0;
  }
 .progress-fill { height: 100%; background: linear-gradient(90deg, var(--text-accent), #7dd3fc); transition: width 0.3s ease; box-shadow: 0 0 10px var(--text-accent); }
 .section { margin: 40px 0; }
 .export { background: var(--success); color: #0a0e1a; border: none; padding: 10px 20px;
    border-radius: 4px; cursor: pointer; font-weight: 700; margin-right: 10px; text-transform: uppercase; font-family: 'Orbitron', system-ui, sans-serif; }
 .complete { background: var(--success); color: #0a0e1a; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 700; }
</style>
</head>
<body>
  <div class="header">
    <img src="starwatch-logo.png" alt="Starwatch Logo" class="logo">
    <div class="title-wrap">
      <h1>Starwatch Polaris Build</h1>
      <span class="live-badge" id="statusBadge">Connecting...</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div>Total Items</div>
      <div class="stat-num">224</div>
    </div>
    <div class="stat-card">
      <div>Collected</div>
      <div class="stat-num" id="collectedItems">0</div>
    </div>
    <div class="stat-card">
      <div>Completion</div>
      <div class="stat-num" id="percentComplete">0%</div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>

  <button class="export" onclick="exportData()">Export CSV</button>

  <div class="section">
    <h2>Bulk Components</h2>
    <table id="bulkTable">
      <thead>
        <tr>
          <th>Item</th>
          <th>Need</th>
          <th>Total Have</th>
          <th>Contributors</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="section">
    <h2>RCMBNT Sets</h2>
    <table id="rcmbntTable">
      <thead>
        <tr>
          <th>Item</th>
          <th>Status</th>
          <th>Claimed By</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
  import { getDatabase, ref, onValue, set, update, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"

  const firebaseConfig = {
    apiKey: "AIzaSyDbKRm2DnKpzNVqNlBCyx_VgTWQM6DLIZ4",
    authDomain: "org-inventory-tracker.firebaseapp.com",
    databaseURL: "https://org-inventory-tracker-default-rtdb.firebaseio.com",
    projectId: "org-inventory-tracker",
    storageBucket: "org-inventory-tracker.firebasestorage.app",
    messagingSenderId: "884594622747",
    appId: "1:884594622747:web:d067c0dbc1bdb4f56a53be"
  }

  const app = initializeApp(firebaseConfig)
  const db = getDatabase(app)
  const itemsRef = ref(db, 'inventory')

  const itemList = [
    {id: 0, name: "Wikelo Favor", qty: 50, type: "bulk"},
    {id: 1, name: "Carinite", qty: 20, type: "bulk"},
    {id: 2, name: "Irradiated Valakkar Fang (Apex)", qty: 20, type: "bulk"},
    {id: 3, name: "MG Scrip", qty: 20, type: "bulk"},
    {id: 4, name: "Polaris Bit", qty: 15, type: "bulk"},
    {id: 5, name: "Ace Interceptor Helmet", qty: 15, type: "bulk"},
    {id: 6, name: "Irradiated Valakkar Pearl (Grade AAA)", qty: 15, type: "bulk"},
    {id: 7, name: "UEE 6th Platoon Medal (Pristine)", qty: 15, type: "bulk"},
    {id: 8, name: "Carinite (Pure)", qty: 15, type: "bulk"},
    {id: 9, name: "ASD Secure Drive", qty: 15, type: "bulk"},
    {id: 10, name: "DCHS-05 Orbital Positioning Comp-Board", qty: 10, type: "bulk"},
    {id: 11, name: "RCMBNT-PWL-1", qty: 1, type: "rcmbnt"},
    {id: 12, name: "RCMBNT-PWL-2", qty: 1, type: "rcmbnt"},
    {id: 13, name: "RCMBNT-PWL-3", qty: 1, type: "rcmbnt"},
    {id: 14, name: "RCMBNT-RGL-1", qty: 1, type: "rcmbnt"},
    {id: 15, name: "RCMBNT-RGL-2", qty: 1, type: "rcmbnt"},
    {id: 16, name: "RCMBNT-RGL-3", qty: 1, type: "rcmbnt"},
    {id: 17, name: "RCMBNT-XTL-1", qty: 1, type: "rcmbnt"},
    {id: 18, name: "RCMBNT-XTL-2", qty: 1, type: "rcmbnt"},
    {id: 19, name: "RCMBNT-XTL-3", qty: 1, type: "rcmbnt"},
  ]

  get(itemsRef).then(snapshot => {
    if (!snapshot.exists()) {
      const initData = {}
      itemList.forEach(item => {
        initData[item.id] = {...item, contributions: {}, updated: Date.now()}
      })
      set(itemsRef, initData)
    }
  })

  onValue(itemsRef, (snapshot) => {
    document.getElementById('statusBadge').textContent = 'LIVE'
    const data = snapshot.val() || {}
    render(Object.values(data))
  })

  window.addContributor = (itemId) => {
    const userInput = document.getElementById(`new-user-${itemId}`)
    const amtInput = document.getElementById(`new-amt-${itemId}`)
    const username = userInput.value.trim()
    const amount = parseInt(amtInput.value) || 0

    if (!username || amount <= 0) {
      alert('Enter a username and amount > 0')
      return
    }

    const safeUsername = username.replace(/[.#$\[\]]/g, '_')
    update(ref(db, `inventory/${itemId}/contributions`), { [safeUsername]: amount })
    update(ref(db, `inventory/${itemId}`), { updated: Date.now() })

    userInput.value = ''
    amtInput.value = ''
  }

  window.updateContribution = (itemId, username, amount) => {
    const val = parseInt(amount) || 0
    if (val <= 0) {
      remove(ref(db, `inventory/${itemId}/contributions/${username}`))
    } else {
      update(ref(db, `inventory/${itemId}/contributions`), { [username]: val })
    }
    update(ref(db, `inventory/${itemId}`), { updated: Date.now() })
  }

  window.removeContributor = (itemId, username) => {
    remove(ref(db, `inventory/${itemId}/contributions/${username}`))
    update(ref(db, `inventory/${itemId}`), { updated: Date.now() })
  }

  window.claimRCMBNT = (itemId, username) => {
    const contribRef = ref(db, `inventory/${itemId}/contributions`)
    if (!username.trim()) {
      set(contribRef, {})
    } else {
      const safeUsername = username.replace(/[.#$\[\]]/g, '_')
      set(contribRef, { [safeUsername]: 1 })
    }
    update(ref(db, `inventory/${itemId}`), { updated: Date.now() })
  }

  window.exportData = async () => {
    const snapshot = await get(itemsRef)
    const data = Object.values(snapshot.val() || {})
    let csv = 'Item,Qty Needed,Total Have,Status,Contributors\n'
    data.forEach(item => {
      const contribs = item.contributions || {}
      const totalHave = Object.values(contribs).reduce((a,b) => a + b, 0)
      const contribStr = Object.entries(contribs).map(([u,a]) => `${u}:${a}`).join('; ')
      const status = totalHave >= item.qty? 'Complete' : 'In Progress'
      csv += `"${item.name}",${item.qty},${totalHave},"${status}","${contribStr}"\n`
    })
    const blob = new Blob([csv], {type: 'text/csv'})
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url; a.download = 'starwatch_polaris_build.csv'; a.click()
  }

  function render(inventory) {
    const bulkTbody = document.querySelector('#bulkTable tbody')
    const rcmTbody = document.querySelector('#rcmbntTable tbody')
    bulkTbody.innerHTML = ''
    rcmTbody.innerHTML = ''

    let totalCollected = 0
    inventory.sort((a,b) => a.id - b.id).forEach(item => {
      const row = document.createElement('tr')
      const contribs = item.contributions || {}
      const totalHave = Object.values(contribs).reduce((a,b) => a + b, 0)
      const isComplete = totalHave >= item.qty
      totalCollected += Math.min(totalHave, item.qty)

      if (item.type === 'bulk') {
        const contribHTML = Object.entries(contribs).map(([user, amt]) => `
          <div class="contributor-row">
            <input type="text" value="${user}" disabled>
            <input type="number" min="0" max="${item.qty * 2}" value="${amt}"
              onchange="updateContribution(${item.id}, '${user}', this.value)">
            <button class="remove-btn" onclick="removeContributor(${item.id}, '${user}')">X</button>
          </div>
        `).join('')

        row.innerHTML = `
          <td>${item.name} ${isComplete? '<span class="complete">COMPLETE</span>' : ''}</td>
          <td>${item.qty}</td>
          <td class="total-have">${totalHave} / ${item.qty}</td>
          <td>
            <div class="contributors">
              ${contribHTML}
              <div class="add-row">
                <input type="text" id="new-user-${item.id}" placeholder="@username">
                <input type="number" id="new-amt-${item.id}" placeholder="Amt" min="1">
                <button class="add-btn" onclick="addContributor(${item.id})">Add</button>
              </div>
            </div>
          </td>
        `
        bulkTbody.appendChild(row)
      } else {
        const owner = Object.keys(contribs)[0] || ''
        if (owner) totalCollected += 1
        row.innerHTML = `
          <td>${item.name}</td>
          <td>${owner? '<span class="complete">CLAIMED</span>' : 'Available'}</td>
          <td>
            <input type="text" placeholder="@username" value="${owner}"
              onchange="claimRCMBNT(${item.id}, this.value)">
          </td>
        `
        rcmTbody.appendChild(row)
      }
    })

    document.getElementById('collectedItems').textContent = totalCollected
    const percent = Math.round(totalCollected / 224 * 100)
    document.getElementById('percentComplete').textContent = percent + '%'
    document.getElementById('progressFill').style.width = percent + '%'
  }
</script>
</body>
</html>
